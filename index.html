<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Penthos Office</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0f;
      overflow: hidden;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      color: #d8d8e0;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    #game canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@4.1.0/dist/phaser.min.js"></script>
</head>
<body>
  <div id="game"></div>
  <script>
    const BUILD_VERSION = "2026-05-20T18:30:00Z";

    // ── Frame indices (verified visually via indexed renders)
    // Modern_Office_16x16.png is 16 cols × 53 rows
    const OFFICE = {
      // Beige desk strip — 3 tiles wide, 2 tiles tall (top row + middle row)
      DESK_TOP_L: 0,  DESK_TOP_M: 1,  DESK_TOP_R: 2,
      DESK_MID_L: 16, DESK_MID_M: 17, DESK_MID_R: 18,
      // Single-tile items
      CHAIR_BLACK:  568,   // dark office chair, back view
      CHAIR_ORANGE: 569,
      MONITOR_BLUE: 712,   // PC monitor with blue desktop on screen
      PLANT_GREEN:  796,   // potted green plant
      PLANT_SMALL:  780,
      FILING_SHELF: 263,   // shelf / filing cabinet (single tile)
      // Server rack — 1 tile wide × 2 tiles tall (top + bottom)
      SERVER_TOP:    616,
      SERVER_BOTTOM: 632,
      // Display / whiteboard — 2 tiles wide × 1 tile tall
      DISPLAY_L: 233, DISPLAY_R: 234,
      // Printer — 2 tiles wide
      PRINTER_L: 680, PRINTER_R: 681
    };

    // Room_Builder_16x16.png is 76 cols × 113 rows
    const FLOOR_FRAME = 914;   // diamond-pattern carpet floor tile

    class OfficeScene extends Phaser.Scene {
      constructor() {
        super({ key: "OfficeScene" });
      }

      preload() {
        // Tilesets
        this.load.spritesheet("walls",  "assets/sprites/interior_walls.png",    { frameWidth: 16, frameHeight: 16 });
        this.load.spritesheet("office", "assets/sprites/office_furniture.png", { frameWidth: 16, frameHeight: 16 });
        this.load.spritesheet("furniture", "assets/sprites/interior_furniture.png", { frameWidth: 16, frameHeight: 16 });

        // Agents
        this.load.json("agents", "agents.json");
      }

      create() {
        const agents = this.cache.json.get("agents");
        // Second load wave for character sheets (16×32)
        agents.forEach(a => {
          this.load.spritesheet(a.spritesheetKey, a.spritesheetPath, {
            frameWidth: 16,
            frameHeight: 32
          });
        });
        this.load.once("complete", () => this._buildScene(agents));
        this.load.start();
      }

      _buildScene(agents) {
        const W = 1280, H = 720;
        const SCALE = 3;
        const TILE = 16 * SCALE; // 48 px on screen per tile

        // ── Floor: tile the entire canvas with the floor frame from Room_Builder
        const colsX = Math.ceil(W / TILE);
        const colsY = Math.ceil(H / TILE);
        for (let ty = 0; ty < colsY; ty++) {
          for (let tx = 0; tx < colsX; tx++) {
            this.add.image(tx * TILE + TILE / 2, ty * TILE + TILE / 2, "walls", FLOOR_FRAME)
              .setScale(SCALE);
          }
        }

        // ── Outer walls (dark border, 2 tiles thick on top, 1 tile on others)
        // Build walls from solid rectangles since Room_Builder wall tiles are
        // door-prebuilt and don't tile cleanly in arbitrary lengths.
        const WALL = 0x2a2429;
        const WALL_HL = 0x4a3f47;
        const WALL_TOP_H = TILE * 2;   // taller top wall for "wall depth"
        const WALL_SIDE_W = TILE;

        // top
        this.add.rectangle(W / 2, WALL_TOP_H / 2, W, WALL_TOP_H, WALL);
        this.add.rectangle(W / 2, WALL_TOP_H - 3, W, 2, WALL_HL).setAlpha(0.7);
        // bottom
        this.add.rectangle(W / 2, H - WALL_SIDE_W / 2, W, WALL_SIDE_W, WALL);
        // left
        this.add.rectangle(WALL_SIDE_W / 2, H / 2, WALL_SIDE_W, H, WALL);
        // right
        this.add.rectangle(W - WALL_SIDE_W / 2, H / 2, WALL_SIDE_W, H, WALL);

        // Area chip labels
        const chip = (x, y, txt) =>
          this.add.text(x, y, txt, {
            fontFamily: "ui-monospace, monospace",
            fontSize: "11px",
            color: "#0a0a0f",
            backgroundColor: "#fffbe8e8",
            padding: { left: 5, right: 5, top: 1, bottom: 1 }
          }).setOrigin(0, 0).setAlpha(0.95);
        chip(WALL_SIDE_W + 8, WALL_TOP_H + 8,       "CEO OFFICE");
        chip(W - 290,         WALL_TOP_H + 8,       "SERVER ROOM");
        chip(WALL_SIDE_W + 8, H - 200,              "ARCHIVE");
        chip(W / 2 - 50,      WALL_TOP_H + 8,       "RECEPTION");

        // ── Furniture placement helpers
        const tile = (gx, gy, key, frame) =>
          this.add.image(gx, gy, key, frame).setScale(SCALE);

        // Place a 3-wide × 2-tall desk (beige) anchored at top-left tile center.
        const placeDesk = (anchorX, anchorY) => {
          // Top row
          tile(anchorX,            anchorY,            "office", OFFICE.DESK_TOP_L);
          tile(anchorX + TILE,     anchorY,            "office", OFFICE.DESK_TOP_M);
          tile(anchorX + TILE * 2, anchorY,            "office", OFFICE.DESK_TOP_R);
          // Bottom row
          tile(anchorX,            anchorY + TILE,     "office", OFFICE.DESK_MID_L);
          tile(anchorX + TILE,     anchorY + TILE,     "office", OFFICE.DESK_MID_M);
          tile(anchorX + TILE * 2, anchorY + TILE,     "office", OFFICE.DESK_MID_R);
        };

        // Place a server rack (1 wide × 2 tall)
        const placeServerRack = (x, y) => {
          tile(x, y,        "office", OFFICE.SERVER_TOP);
          tile(x, y + TILE, "office", OFFICE.SERVER_BOTTOM);
        };

        // Place a printer (2 wide × 1 tall)
        const placePrinter = (x, y) => {
          tile(x,        y, "office", OFFICE.PRINTER_L);
          tile(x + TILE, y, "office", OFFICE.PRINTER_R);
        };

        // ── CEO OFFICE (top-left): desk + chair + plant + display
        const ceoDeskX = WALL_SIDE_W + TILE + TILE / 2;
        const ceoDeskY = WALL_TOP_H + TILE * 2 + TILE / 2;
        placeDesk(ceoDeskX, ceoDeskY);
        // monitor on desk (centered top of desk)
        tile(ceoDeskX + TILE, ceoDeskY - TILE / 4, "office", OFFICE.MONITOR_BLUE);
        // chair behind/under desk
        tile(ceoDeskX + TILE, ceoDeskY + TILE * 2 + TILE / 4, "office", OFFICE.CHAIR_BLACK);
        // big plant in corner
        tile(WALL_SIDE_W + TILE / 2 + TILE / 2, WALL_TOP_H + TILE + TILE / 2, "office", OFFICE.PLANT_GREEN);
        // display board on top wall
        tile(ceoDeskX + TILE * 4,        WALL_TOP_H + TILE / 2, "office", OFFICE.DISPLAY_L);
        tile(ceoDeskX + TILE * 4 + TILE, WALL_TOP_H + TILE / 2, "office", OFFICE.DISPLAY_R);

        // ── SERVER ROOM (top-right): row of 3 server racks + D'Artagnan's desk
        const svrX0 = W - TILE * 8;
        const svrY  = WALL_TOP_H + TILE * 2;
        for (let i = 0; i < 3; i++) {
          placeServerRack(svrX0 + i * TILE * 1.4, svrY);
        }
        // D'Artagnan's desk in front
        const dDeskX = W - TILE * 5;
        const dDeskY = svrY + TILE * 3 + TILE / 2;
        placeDesk(dDeskX, dDeskY);
        tile(dDeskX + TILE, dDeskY - TILE / 4, "office", OFFICE.MONITOR_BLUE);
        tile(dDeskX + TILE, dDeskY + TILE * 2 + TILE / 4, "office", OFFICE.CHAIR_BLACK);

        // ── RECEPTION (middle-top): plant cluster + small display
        const recX = W / 2 - TILE;
        const recY = WALL_TOP_H + TILE * 2;
        tile(recX,                recY,            "office", OFFICE.PLANT_GREEN);
        tile(recX + TILE,         recY,            "office", OFFICE.PLANT_SMALL);
        tile(recX + TILE * 2,     recY,            "office", OFFICE.PLANT_GREEN);

        // ── ARCHIVE (bottom): row of 5 filing cabinets + Porthos's desk + printer
        const archY = H - TILE * 3;
        for (let i = 0; i < 5; i++) {
          tile(WALL_SIDE_W + TILE * 2 + i * TILE, archY, "office", OFFICE.FILING_SHELF);
        }
        const pDeskX = WALL_SIDE_W + TILE * 12;
        const pDeskY = archY - TILE / 2;
        placeDesk(pDeskX, pDeskY);
        tile(pDeskX + TILE, pDeskY + TILE * 2 + TILE / 4, "office", OFFICE.CHAIR_ORANGE);
        // printer next to Porthos
        placePrinter(pDeskX + TILE * 4, pDeskY + TILE / 2);

        // ── Agents
        agents.forEach(agent => {
          // 4 walk animations
          const dirs = [
            ["down",  agent.walkDownFrames],
            ["up",    agent.walkUpFrames],
            ["left",  agent.walkLeftFrames],
            ["right", agent.walkRightFrames]
          ];
          dirs.forEach(([suffix, frames]) => {
            const key = `${agent.id}-walk-${suffix}`;
            if (!this.anims.exists(key)) {
              this.anims.create({
                key,
                frames: this.anims.generateFrameNumbers(agent.spritesheetKey, { frames }),
                frameRate: 8,
                repeat: -1
              });
            }
          });

          const s = this.add
            .sprite(agent.homeX, agent.homeY, agent.spritesheetKey, agent.idleFrame)
            .setScale(SCALE)
            .setOrigin(0.5, 0.9); // anchor near feet

          // Breathing tween — gentle 1px Y bob over 2s
          this.tweens.add({
            targets: s,
            y: agent.homeY - 1,
            duration: 1000,
            yoyo: true,
            repeat: -1,
            ease: "Sine.inOut"
          });

          // Name chip floating above
          this.add
            .text(agent.homeX, agent.homeY - 32 * SCALE * 0.85, agent.displayName, {
              fontFamily: "ui-monospace, monospace",
              fontSize: "12px",
              color: "#fffbe8",
              backgroundColor: "#0a0a0fcc",
              padding: { left: 4, right: 4, top: 1, bottom: 1 }
            })
            .setOrigin(0.5, 1)
            .setAlpha(0.92);
        });

        // ── Build version overlay
        this.add
          .text(W - 6, H - 6, `build ${BUILD_VERSION}`, {
            fontFamily: "ui-monospace, monospace",
            fontSize: "10px",
            color: "#fffbe8"
          })
          .setOrigin(1, 1)
          .setAlpha(0.55);
      }
    }

    const config = {
      type: Phaser.AUTO,
      parent: "game",
      width: 1280,
      height: 720,
      backgroundColor: "#0a0a0f",
      pixelArt: true,
      antialias: false,
      roundPixels: true,
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
      },
      scene: [OfficeScene]
    };

    new Phaser.Game(config);
  </script>
</body>
</html>
