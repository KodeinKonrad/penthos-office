<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Penthos Office</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0f;
      overflow: hidden;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      color: #d8d8e0;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    #game canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@4.1.0/dist/phaser.min.js"></script>
</head>
<body>
  <div id="game"></div>
  <script>
    const BUILD_VERSION = "2026-05-22T17:00:00Z";

    // ── Phase 3: SSE endpoint + action handlers
    // Frontend is READ-ONLY: subscribes to /events, never POSTs.
    // Bearer token stays server-side (n8n/GitHub/Claude Code hooks).
    const HUB_URL_PROD = "https://office-api.penthos.app/events";
    const HUB_URL_DEV  = "http://localhost:3001/events";

    const RECONNECT_BACKOFF = [1000, 2000, 4000, 8000, 16000, 30000];
    const DEBUG = new URLSearchParams(window.location.search).get("debug") === "1";

    // Modern_Office_16x16.png (16 cols × 53 rows).
    const OFFICE = {
      DESK_TOP_L: 0,  DESK_TOP_M: 1,  DESK_TOP_R: 2,
      DESK_MID_L: 16, DESK_MID_M: 17, DESK_MID_R: 18,
      CHAIR_BLACK:  716,
      CHAIR_ORANGE: 717,
      MONITOR_BLUE: 712,
      PLANT_GREEN:  796,
      PLANT_SMALL:  780,
      FILING_SHELF: 263,
      SERVER_TOP:    616,
      SERVER_BOTTOM: 632,
      DISPLAY_TOP_L: 233, DISPLAY_TOP_R: 234,
      DISPLAY_BOT_L: 249, DISPLAY_BOT_R: 250,
      PRINTER_L: 680, PRINTER_R: 681
    };

    // Room_Builder_Floors_16x16.png (15 cols × 40 rows). Frame 61 = clean white seamless fill.
    const FLOOR_WHITE = 61;

    // Phase 7B room geometry. Canvas 1280×720 at TILE=48 → 26.67 × 15 tiles.
    // Outer wall 1 tile. Horizontal dividers at row 5 (top band ↔ meeting) and row 9
    // (meeting ↔ bottom band). Vertical divider at col 13 in top & bottom bands only.
    const WALL_FILL    = 0xb8c0c8;
    const WALL_ACCENT  = 0x6a747e;
    // Doorway gap = 2 tiles centered on cols 5-6 (server/testing) and 19-20 (frontend/lounge).

    // Wienerische Sprechblasen-Pools (Phase 7B). {file} wird durch meta.file ersetzt.
    const BUBBLE_LINES = {
      "code.write.frontend": [
        "I pass des Layout grad an",
        "Schau ma, obs jetzt schöner is",
        "{file} kriegt an neuen Anstrich",
        "Mom, des sieht no nix aus",
        "Frontend-Feinschliff"
      ],
      "code.write.backend": [
        "I muass kurz was an da Datenstruktur drahn",
        "{file} braucht a Anpassung",
        "Backend kurz biagln",
        "Migration durchziehn",
        "Data-Layer rasch fixen"
      ],
      "code.bash": [
        "I schau ma schnö am Server um",
        "Lass mi grad {file}",
        "Kurz was am Terminal checken",
        "Server-Run pflegen",
        "Bash-Kurzeinlage"
      ],
      "git.push": [
        "So, des kummt jetzt aufi",
        "Ab damit auf main",
        "Push is draussen",
        "Hopp, nach GitHub",
        "Commit unterwegs"
      ]
    };

    // Maps file path/extension → "frontend" or "backend" bucket
    function bubbleBucket(action, file) {
      if (action === "git.push") return "git.push";
      if (action === "code.bash") return "code.bash";
      if (action === "code.write") {
        if (!file) return "code.write.frontend";
        const f = String(file).toLowerCase();
        if (f.endsWith(".sql") || f.includes("migration") || f.includes("dartagnan") ||
            f.endsWith(".mjs") || f.endsWith(".js") && f.includes("server")) {
          return "code.write.backend";
        }
        return "code.write.frontend";
      }
      return null;
    }
    function pickPhrase(action, file) {
      const bucket = bubbleBucket(action, file);
      if (!bucket || !BUBBLE_LINES[bucket]) return file || action;
      const pool = BUBBLE_LINES[bucket];
      const line = pool[Math.floor(Math.random() * pool.length)];
      return line.replace("{file}", file || "des");
    }

    // Character sheet has 56 cols × 20 char-rows of 16×32 frames = 1120 total
    const CHAR_SHEET_COLS = 56;
    const CHAR_SHEET_ROWS = 20;
    const CHAR_FRAME_COUNT = CHAR_SHEET_COLS * CHAR_SHEET_ROWS;

    class OfficeScene extends Phaser.Scene {
      constructor() {
        super({ key: "OfficeScene" });
      }

      preload() {
        this.load.spritesheet("walls",     "assets/sprites/interior_walls.png",     { frameWidth: 16, frameHeight: 16 });
        this.load.spritesheet("office",    "assets/sprites/office_furniture.png",  { frameWidth: 16, frameHeight: 16 });
        this.load.spritesheet("furniture", "assets/sprites/interior_furniture.png", { frameWidth: 16, frameHeight: 16 });
        this.load.spritesheet("floors",    "assets/sprites/floors.png",            { frameWidth: 16, frameHeight: 16 });
        this.load.json("agents", "agents.json?v=" + encodeURIComponent(BUILD_VERSION));
      }

      create() {
        const agents = this.cache.json.get("agents");
        agents.forEach(a => {
          // 16×32 frames — LimeZu chibi spans 2 grid cells vertically (hair row + body row)
          this.load.spritesheet(a.spritesheetKey, a.spritesheetPath, {
            frameWidth: 16,
            frameHeight: 32
          });
        });
        this.load.once("complete", () => this._buildScene(agents));
        this.load.start();
      }

      _buildScene(agents) {
        const W = 1280, H = 720;
        const SCALE = 3;
        const TILE = 16 * SCALE; // 48 px on screen per tile

        // ── Floor: tile entire canvas with seamless white (Room_Builder_Floors frame 500)
        const colsX = Math.ceil(W / TILE);
        const colsY = Math.ceil(H / TILE);
        for (let ty = 0; ty < colsY; ty++) {
          for (let tx = 0; tx < colsX; tx++) {
            this.add.image(tx * TILE + TILE / 2, ty * TILE + TILE / 2, "floors", FLOOR_WHITE)
              .setScale(SCALE);
          }
        }

        // ── Outer walls (light gray rectangles, 1 tile thick)
        this.add.rectangle(W / 2, TILE / 2,     W, TILE, WALL_FILL);
        this.add.rectangle(W / 2, H - TILE / 2, W, TILE, WALL_FILL);
        this.add.rectangle(TILE / 2,     H / 2, TILE, H, WALL_FILL);
        this.add.rectangle(W - TILE / 2, H / 2, TILE, H, WALL_FILL);

        // ── Inner horizontal dividers. Phase 7B.9: row 9 wall only covers cols 1–12
        // (testing↔big-room) so lounge merges with meeting into one L-shaped big room.
        const horizWallSegments = (yCenter, segs) => {
          for (const s of segs) {
            const cx = (s.x0 + s.x1) / 2;
            const w  = s.x1 - s.x0;
            this.add.rectangle(cx, yCenter, w, TILE, WALL_FILL);
            this.add.rectangle(cx, yCenter - TILE / 2 + 1, w, 2, WALL_ACCENT).setAlpha(0.55);
          }
        };
        // Row 5 wall: full width, doorways at cols 5–6 (server) and cols 19–20 (frontend)
        horizWallSegments(5 * TILE + TILE / 2, [
          { x0: 48,   x1: 240  },
          { x0: 336,  x1: 912  },
          { x0: 1008, x1: 1232 }
        ]);
        // Row 9 wall: cols 1–13 (testing/big-room divider). Cols 14–24 OPEN.
        // Doorway at cols 5–6 (testing↔big-room). Seg B reaches x=672 so it closes
        // the corner against the col-13 vertical wall (Phase 7C FIX 1).
        horizWallSegments(9 * TILE + TILE / 2, [
          { x0: 48,  x1: 240 },
          { x0: 336, x1: 672 }
        ]);

        // ── Vertical divider at col 13, only in top band (rows 1–4) and bottom band (rows 10–13).
        // Meetingroom band (rows 6–8) is one open horizontal corridor.
        const x13 = 13 * TILE + TILE / 2;  // 648
        this.add.rectangle(x13, 144, TILE, 4 * TILE, WALL_FILL); // top vert
        this.add.rectangle(x13, 576, TILE, 4 * TILE, WALL_FILL); // bottom vert
        this.add.rectangle(x13 - TILE / 2 + 1, 144, 2, 4 * TILE, WALL_ACCENT).setAlpha(0.55);
        this.add.rectangle(x13 - TILE / 2 + 1, 576, 2, 4 * TILE, WALL_ACCENT).setAlpha(0.55);

        // ── Area chip labels (5 areas)
        const chip = (x, y, txt) =>
          this.add.text(x, y, txt, {
            fontFamily: "ui-monospace, monospace",
            fontSize: "11px",
            color: "#0a0a0f",
            backgroundColor: "#fffbe8e8",
            padding: { left: 5, right: 5, top: 1, bottom: 1 }
          }).setOrigin(0, 0).setAlpha(0.95);
        chip(TILE + 8,      TILE + 8,         "SERVER ROOM");
        chip(14 * TILE + 8, TILE + 8,         "FRONTEND");
        chip(W / 2 - 56,    6 * TILE + 8,     "MEETING ROOM");
        chip(TILE + 8,      10 * TILE + 8,    "TESTING / QA");

        // ── Furniture helpers
        const tile = (gx, gy, key, frame, depth = 0) => {
          const img = this.add.image(gx, gy, key, frame).setScale(SCALE);
          if (depth) img.setDepth(depth);
          return img;
        };
        const placeDesk = (anchorX, anchorY) => {
          tile(anchorX,            anchorY,        "office", OFFICE.DESK_TOP_L);
          tile(anchorX + TILE,     anchorY,        "office", OFFICE.DESK_TOP_M);
          tile(anchorX + TILE * 2, anchorY,        "office", OFFICE.DESK_TOP_R);
          tile(anchorX,            anchorY + TILE, "office", OFFICE.DESK_MID_L);
          tile(anchorX + TILE,     anchorY + TILE, "office", OFFICE.DESK_MID_M);
          tile(anchorX + TILE * 2, anchorY + TILE, "office", OFFICE.DESK_MID_R);
        };
        // Compact 2×1 desk for individual workers (Phase 7B.7). One top row only.
        const placeSmallDesk = (anchorX, anchorY) => {
          tile(anchorX,        anchorY, "office", OFFICE.DESK_TOP_L);
          tile(anchorX + TILE, anchorY, "office", OFFICE.DESK_TOP_R);
        };
        // Phase 7B.8: flat-graphics desk that sits cleanly on the white floor without
        // the LimeZu wood-brown tile look. center = (cx, cy), width in tiles, height = 1 tile.
        const drawFlatDesk = (cx, cy, widthTiles) => {
          const w = widthTiles * TILE;
          const h = TILE; // 48 px
          const g = this.add.graphics();
          // light-gray top surface
          g.fillStyle(0xd2d8de, 1);
          g.fillRoundedRect(cx - w / 2, cy - h / 2, w, h, 4);
          // subtle dark border
          g.lineStyle(1, 0x7a838d, 1);
          g.strokeRoundedRect(cx - w / 2 + 0.5, cy - h / 2 + 0.5, w, h, 4);
          // back-edge accent line (defines the "back" of the desk)
          g.fillStyle(0x7a838d, 1);
          g.fillRect(cx - w / 2 + 4, cy - h / 2 + 3, w - 8, 2);
          return g;
        };
        const placeServerRack = (x, y) => {
          // Phase 7B.9: drop SERVER_BOTTOM to avoid the tan/beige base patch on the white floor.
          // 1-tile rack head only.
          tile(x, y, "office", OFFICE.SERVER_TOP);
        };
        const placeMonitorOnDesk = (deskAnchorX, deskAnchorY, colOffset = 1) => {
          tile(deskAnchorX + colOffset * TILE, deskAnchorY, "office", OFFICE.MONITOR_BLUE, 10);
        };
        const placeDisplayBoard = (anchorX, anchorY) => {
          tile(anchorX,        anchorY,        "office", OFFICE.DISPLAY_TOP_L);
          tile(anchorX + TILE, anchorY,        "office", OFFICE.DISPLAY_TOP_R);
          tile(anchorX,        anchorY + TILE, "office", OFFICE.DISPLAY_BOT_L);
          tile(anchorX + TILE, anchorY + TILE, "office", OFFICE.DISPLAY_BOT_R);
        };

        // ── SERVER ROOM (cols 1–12, rows 1–4) — 3 racks + D'Art's flat desk bündig in NE corner
        for (let i = 0; i < 3; i++) {
          placeServerRack(2 * TILE + 12 + i * TILE * 1.25, 2 * TILE + TILE / 2);
        }
        drawFlatDesk(576, 72, 2);
        tile(576, 72, "office", OFFICE.MONITOR_BLUE, 10);

        // ── FRONTEND (cols 14–24, rows 1–4) — design wall + Aramis flat desk in NE corner
        placeDisplayBoard(17 * TILE, TILE + TILE / 2);
        drawFlatDesk(1184, 72, 2);
        tile(1184, 72, "office", OFFICE.MONITOR_BLUE, 10);

        // ── BIG MEETING ROOM (L-shaped: meeting band rows 6–8 full width + lounge cols 14–24
        // rows 10–13). Phase 7B.9: conf table moved to lounge area, new whiteboard added.
        // Whiteboard bündig east wall (x_right=1232), top of lounge area
        placeDisplayBoard(1160, 480 + TILE / 2);
        // Conference table 3 tiles wide, centered in lounge area
        drawFlatDesk(864, 504, 3);
        // Couch — 3-cushion sofa pushed to south of lounge area
        const couchG = this.add.graphics();
        const couchCX = 18 * TILE + TILE / 2; // 888
        const couchCY = 13 * TILE - 12;       // 612
        couchG.fillStyle(0x4a3a30, 1);
        couchG.fillRoundedRect(couchCX - 1.6 * TILE, couchCY - 0.55 * TILE, 3.2 * TILE, 1.3 * TILE, 10);
        couchG.fillStyle(0x826450, 1);
        couchG.fillRoundedRect(couchCX - 1.5 * TILE,  couchCY - 0.45 * TILE, TILE * 0.9, TILE * 0.95, 5);
        couchG.fillRoundedRect(couchCX - 0.45 * TILE, couchCY - 0.45 * TILE, TILE * 0.9, TILE * 0.95, 5);
        couchG.fillRoundedRect(couchCX + 0.6 * TILE,  couchCY - 0.45 * TILE, TILE * 0.9, TILE * 0.95, 5);
        couchG.fillStyle(0x2a1f18, 1);
        couchG.fillRect(couchCX - 1.55 * TILE, couchCY - 0.6 * TILE, 3.1 * TILE, 5);

        // ── TESTING / QA (cols 1–12, rows 10–13) — whiteboard + Porthos flat desk in NE corner
        placeDisplayBoard(2 * TILE, 10 * TILE + TILE / 2);
        drawFlatDesk(576, 504, 2);
        tile(576, 504, "office", OFFICE.MONITOR_BLUE, 10);

        // ── Agents
        // Registry of agent handles → consumed by SSE event handler for move animations.
        const agentMap = {};
        agents.forEach(agent => {
          // Walk animations
          const dirs = [
            ["down",  agent.walkDownFrames],
            ["up",    agent.walkUpFrames],
            ["left",  agent.walkLeftFrames],
            ["right", agent.walkRightFrames]
          ];
          dirs.forEach(([suffix, frames]) => {
            const key = `${agent.id}-walk-${suffix}`;
            if (!this.anims.exists(key)) {
              this.anims.create({
                key,
                frames: this.anims.generateFrameNumbers(agent.spritesheetKey, { frames }),
                frameRate: 8,
                repeat: -1
              });
            }
          });

          // Sprite — chibi 16×16 scaled 3×, origin at feet.
          // Guard against stale/partial agents.json where idleFrame is missing:
          // Phaser silently falls back to frame 0 if frame is undefined, which renders
          // a tiny back-of-head blob and looks like the char vanished.
          const safeIdle = (typeof agent.idleFrame === "number") ? agent.idleFrame : 3;
          let currentFrame = safeIdle;
          const s = this.add
            .sprite(agent.homeX, agent.homeY, agent.spritesheetKey, currentFrame)
            .setScale(SCALE)
            .setOrigin(0.5, 1.0);

          // Breathing — gentle 1px Y bob over 2s
          this._addBreathing(s, { x: agent.homeX, y: agent.homeY });

          // Stash a handle for the SSE event handler
          const stationRaw = agent.stations && agent.stations.work;
          const gatesRaw = agent.gatePoints || (agent.gatePoint ? [agent.gatePoint] : null);
          agentMap[agent.id] = {
            id: agent.id,
            sprite: s,
            home: { x: agent.homeX, y: agent.homeY, idleFrame: safeIdle },
            station: stationRaw ? { x: stationRaw.x, y: stationRaw.y } : null,
            gatePoints: gatesRaw ? gatesRaw.map(g => ({ x: g.x, y: g.y })) : null,
            busy: false,
            idleBusy: false,
            idleTimer: null
          };

          // Name chip floating above the sprite — tracked per-frame so it follows
          // walks and patrols (Phase 7B fix). Uses same scene.update() hook as bubbles.
          const nameText = this.add
            .text(0, 0, agent.displayName, {
              fontFamily: "ui-monospace, monospace",
              fontSize: "12px",
              color: "#fffbe8",
              backgroundColor: "#0a0a0fcc",
              padding: { left: 4, right: 4, top: 1, bottom: 1 }
            })
            .setOrigin(0.5, 1)
            .setAlpha(0.92);
          const NAME_Y_OFFSET = -32 * SCALE - 6; // 102 px above feet
          nameText.setPosition(agent.homeX, agent.homeY + NAME_Y_OFFSET);
          if (!this._liveNameChips) this._liveNameChips = [];
          this._liveNameChips.push({ text: nameText, sprite: s, offset: NAME_Y_OFFSET });

          // ── Debug overlay — only when ?debug=1
          if (DEBUG) {
            // Cyan bounding box around the 48×96 sprite footprint (16×32 at scale 3)
            const charDispW = 16 * SCALE;  // 48
            const charDispH = 32 * SCALE;  // 96
            const bbox = this.add.graphics();
            bbox.lineStyle(1, 0x00ffff, 1);
            bbox.strokeRect(
              agent.homeX - charDispW / 2,
              agent.homeY - charDispH,
              charDispW,
              charDispH
            );

            // Frame index label above the char
            const frameLabel = this.add
              .text(agent.homeX, agent.homeY - charDispH - 24, `f${currentFrame}`, {
                fontFamily: "ui-monospace, monospace",
                fontSize: "11px",
                color: "#00ffff",
                backgroundColor: "#000000cc",
                padding: { left: 4, right: 4, top: 1, bottom: 1 }
              })
              .setOrigin(0.5, 1)
              .setDepth(1000);

            // Make sprite clickable; each click cycles +1 with wrap
            s.setInteractive({ useHandCursor: true });
            s.on("pointerdown", () => {
              currentFrame = (currentFrame + 1) % CHAR_FRAME_COUNT;
              s.setFrame(currentFrame);
              frameLabel.setText(`f${currentFrame}`);
            });
          }
        });

        // ── Sporadic idle behavior for all non-Paul agents (Phase 7C FIX 3).
        // Paul stays back-to-room at the conference table; the others occasionally
        // wander to the couch, glance at the lounge whiteboard, or shift in place.
        Object.values(agentMap).forEach(a => this._startIdleBehavior(a));

        // Debug exposure for headless tests (Phase 7B verify step).
        if (DEBUG) {
          window.__office = { scene: this, agentMap };
        }

        // ── Debug banner + Phase 3 trigger buttons (top-left)
        if (DEBUG) {
          this.add
            .text(8, 8, "DEBUG MODE — click a char to cycle frames", {
              fontFamily: "ui-monospace, monospace",
              fontSize: "11px",
              color: "#0a0a0f",
              backgroundColor: "#00ffffe0",
              padding: { left: 5, right: 5, top: 1, bottom: 1 }
            })
            .setDepth(2000);
          this._addDebugTriggers(agentMap);
        }

        // ── Phase 3: SSE connection (auto-reconnect with backoff)
        this._connectHub(agentMap, W);

        // ── Build version overlay
        this.add
          .text(W - 6, H - 6, `build ${BUILD_VERSION}${DEBUG ? " · debug" : ""}`, {
            fontFamily: "ui-monospace, monospace",
            fontSize: "10px",
            color: "#fffbe8"
          })
          .setOrigin(1, 1)
          .setAlpha(0.55);
      }

      // ── Helpers used by the SSE event handler

      _addBreathing(sprite, home) {
        // Gentle 1px Y bob over 2s, looped forever. Killed by killTweensOf
        // during walks; re-added on arrival.
        return this.tweens.add({
          targets: sprite,
          y: home.y - 1,
          duration: 1000,
          yoyo: true,
          repeat: -1,
          ease: "Sine.inOut"
        });
      }

      _connectHub(agentMap, W) {
        const isLocal = location.hostname === "localhost" || location.hostname === "127.0.0.1";
        const url = isLocal ? HUB_URL_DEV : HUB_URL_PROD;

        // Status dot (top-right). Three states: yellow connecting/reconnecting,
        // green open, red disconnected.
        const dot = this.add
          .text(W - 6, 6, "● connecting", {
            fontFamily: "ui-monospace, monospace",
            fontSize: "10px",
            color: "#f0c870",
            backgroundColor: "#0a0a0fcc",
            padding: { left: 4, right: 4, top: 1, bottom: 1 }
          })
          .setOrigin(1, 0)
          .setDepth(2000)
          .setAlpha(0.85);
        // Native browser tooltip via the underlying DOM node (Phaser Text exposes it).
        const setTip = (txt) => {
          if (dot.node) dot.node.title = txt;
          else if (dot.canvas) dot.canvas.title = txt;
        };
        setTip("Connecting to " + url);

        this._sseState = {
          dot, setTip, url, agentMap,
          es: null,
          backoffIndex: 0,
          reconnectTimer: null,
          tickTimer: null,
          retryAt: 0,
          closed: false
        };
        this._openSse();
      }

      _openSse() {
        const s = this._sseState;
        s.dot.setText("● connecting").setColor("#f0c870");
        s.setTip("Connecting to " + s.url);

        let es;
        try {
          es = new EventSource(s.url);
        } catch (e) {
          console.error("[office] SSE constructor threw:", e);
          this._scheduleReconnect();
          return;
        }
        s.es = es;

        es.onopen = () => {
          s.backoffIndex = 0; // reset backoff on successful open
          s.dot.setText("● live").setColor("#7fd97f");
          s.setTip("Connected · " + s.url);
          console.log("[office] SSE open:", s.url);
        };

        // Hub sends a named "hello" event right after connect. Ignore the payload —
        // it's just a greeting; readyState=OPEN already tells us we're live.
        es.addEventListener("hello", (e) => {
          console.log("[office] hello:", e.data);
        });

        // Default `message` event — the server's office events arrive here
        // (no custom `event:` line ⇒ default type).
        es.onmessage = (e) => {
          let data;
          try { data = JSON.parse(e.data); }
          catch (err) { console.warn("[office] bad JSON:", err, e.data); return; }
          console.log("[office] event:", data);
          this._handleEvent(data);
        };
        // Also listen on a named "office" event in case the hub upgrades to typed events.
        es.addEventListener("office", (e) => {
          let data;
          try { data = JSON.parse(e.data); }
          catch (err) { console.warn("[office] bad JSON:", err, e.data); return; }
          console.log("[office] event:", data);
          this._handleEvent(data);
        });

        es.onerror = (e) => {
          console.warn("[office] SSE error; readyState=", es.readyState);
          if (es.readyState === EventSource.CLOSED) {
            this._scheduleReconnect();
          }
          // CONNECTING (0) means the browser is itself retrying. Surface as yellow.
          else if (es.readyState === EventSource.CONNECTING) {
            s.dot.setText("● reconnecting").setColor("#f0c870");
            s.setTip("Reconnecting…");
          }
        };
      }

      _scheduleReconnect() {
        const s = this._sseState;
        if (!s || s.closed) return;
        if (s.es) { try { s.es.close(); } catch {} s.es = null; }
        const delay = RECONNECT_BACKOFF[Math.min(s.backoffIndex, RECONNECT_BACKOFF.length - 1)];
        s.backoffIndex++;
        s.retryAt = Date.now() + delay;

        // Disconnected (red) until the next attempt fires.
        s.dot.setText("● disconnected").setColor("#e0606e");
        s.setTip(`Disconnected — retry in ${Math.ceil(delay / 1000)}s`);

        // Tick the tooltip every second so the user sees the countdown on hover.
        if (s.tickTimer) clearInterval(s.tickTimer);
        s.tickTimer = setInterval(() => {
          if (!this._sseState || this._sseState !== s) { clearInterval(s.tickTimer); return; }
          const left = Math.max(0, Math.ceil((s.retryAt - Date.now()) / 1000));
          if (left > 0) {
            s.dot.setText("● reconnecting").setColor("#f0c870");
            s.setTip(`Reconnecting in ${left}s`);
          }
        }, 1000);

        if (s.reconnectTimer) clearTimeout(s.reconnectTimer);
        s.reconnectTimer = setTimeout(() => {
          if (s.tickTimer) { clearInterval(s.tickTimer); s.tickTimer = null; }
          this._openSse();
        }, delay);
      }

      _handleEvent(event) {
        if (!event || typeof event !== "object") return;
        // Defensive: also accept legacy {target, action} or {agent, type}
        const agentId = event.agent || event.target;
        const action  = event.action || event.type;
        if (!agentId || !action) return;
        if (action === "idle") return;
        if (action === "hello") return; // already handled by named listener
        const map = this._sseState && this._sseState.agentMap;
        const data = map ? map[agentId] : null;
        if (!data) return console.warn("[office] unknown agent:", agentId);

        // Wienerische Sprechblase statt rohem action-String
        const file = event.meta && event.meta.file;
        const phrase = pickPhrase(action, file);
        this._showBubble(data.sprite, data.home, phrase);

        // Reactive Paul gesture for any non-Paul, non-Porthos-patrol event
        if (agentId !== "paul" && map && map.paul) {
          this._paulGesture(map.paul, agentId);
        }

        if (action === "code.write" || action === "code.bash") {
          this._actionWalkToStation(data, action);
        } else if (action === "git.push") {
          this._actionGitPush(data);
        } else {
          console.log("[office] unknown action, bubble only:", action);
        }
      }

      // Phase 7B.9: traverse a list of waypoints (home → gates… → station, then reverse).
      // Routes around walls when home is in big room and station is in a walled-off work room.
      _actionWalkToStation(data, action) {
        const { sprite, home, station, gatePoints } = data;
        if (!station) return;
        // If mid-idle (couch/whiteboard/wander), preempt it: kill its tween + timer
        // and continue with the event walk from the agent's current position.
        if (data.idleBusy) this._cancelIdle(data);
        if (data.busy) return;

        data.busy = true;
        this.tweens.killTweensOf(sprite);

        const dur = 1000;
        const id = data.id;
        const segment = (fx, fy, tx, ty, onDone) => {
          const dx = tx - fx, dy = ty - fy;
          const dir = Math.abs(dy) >= Math.abs(dx)
            ? (dy < 0 ? "up" : "down")
            : (dx < 0 ? "left" : "right");
          const key = `${id}-walk-${dir}`;
          if (this.anims.exists(key)) sprite.play(key);
          this.tweens.add({
            targets: sprite, x: tx, y: ty, duration: dur, ease: "Sine.inOut",
            onComplete: onDone
          });
        };
        const traverse = (pts, onDone) => {
          let cur = { x: sprite.x, y: sprite.y };
          let i = 0;
          const next = () => {
            if (i >= pts.length) { onDone(); return; }
            const wp = pts[i++];
            segment(cur.x, cur.y, wp.x, wp.y, () => { cur = wp; next(); });
          };
          next();
        };
        const resume = () => {
          sprite.stop();
          sprite.setFrame(home.idleFrame);
          sprite.setPosition(home.x, home.y);
          this._addBreathing(sprite, home);
          data.busy = false;
          this._scheduleNextIdle(data);
        };

        const out  = gatePoints ? [...gatePoints, station] : [station];
        const back = gatePoints ? [...[...gatePoints].reverse(), home] : [home];

        traverse(out, () => {
          sprite.stop();
          sprite.setFrame(home.idleFrame);
          this.time.delayedCall(800, () => traverse(back, resume));
        });
      }

      // Reactive "ich teile einen Auftrag aus"-Geste: Paul wechselt für 600ms in die
      // walk-Richtung des Adressaten und kehrt dann zum back-Idle zurück.
      _paulGesture(paulData, towardAgentId) {
        if (paulData.busy) return;
        const { sprite, home } = paulData;
        const dir = {
          dartagnan: "left",   // NW
          aramis:    "right",  // NE
          porthos:   "left"    // SW
        }[towardAgentId] || "up";
        const walkKey = `paul-walk-${dir}`;
        if (!this.anims.exists(walkKey)) return;

        this.tweens.killTweensOf(sprite);
        sprite.play(walkKey);
        // tiny half-tile step in the gesture direction, then back (TILE/2 = 24)
        const step = 24;
        const dx = dir === "left" ? -step : dir === "right" ? step : 0;
        const dy = dir === "up" ? -step : dir === "down" ? step : 0;

        paulData.busy = true;
        this.tweens.add({
          targets: sprite, x: home.x + dx, y: home.y + dy,
          duration: 300, ease: "Sine.inOut",
          onComplete: () => {
            this.tweens.add({
              targets: sprite, x: home.x, y: home.y,
              duration: 300, ease: "Sine.inOut",
              onComplete: () => {
                sprite.stop();
                sprite.setFrame(home.idleFrame); // back to back-still
                this._addBreathing(sprite, home);
                paulData.busy = false;
              }
            });
          }
        });
      }

      // ── Sporadic idle behavior (Phase 7C FIX 3).
      // Non-Paul agents occasionally leave their idle home to do something small —
      // sit on the couch, glance at the lounge whiteboard, or shift a couple of
      // tiles and come back. Timer fires every 9–22s; if the agent is busy with an
      // event walk, the tick is skipped and rescheduled. Any incoming event
      // preempts the idle action via _cancelIdle().
      _startIdleBehavior(agentData) {
        if (agentData.id === "paul") return;
        this._scheduleNextIdle(agentData);
      }

      _scheduleNextIdle(agentData) {
        if (agentData.id === "paul") return;
        if (agentData.idleTimer) { agentData.idleTimer.remove(); agentData.idleTimer = null; }
        const delay = 9000 + Math.random() * 13000;
        agentData.idleTimer = this.time.delayedCall(delay, () => {
          agentData.idleTimer = null;
          if (agentData.busy) { this._scheduleNextIdle(agentData); return; }
          this._performIdleAction(agentData);
        });
      }

      _cancelIdle(agentData) {
        if (agentData.idleTimer) { agentData.idleTimer.remove(); agentData.idleTimer = null; }
        if (agentData.idleBusy) {
          this.tweens.killTweensOf(agentData.sprite);
          agentData.idleBusy = false;
          agentData.busy = false;
        }
      }

      _performIdleAction(agentData) {
        // Weighted choice: 50% small shift, 25% couch, 25% lounge whiteboard.
        // Shifts are quick and look like fidgeting; couch/whiteboard are longer trips.
        const r = Math.random();
        let target, pauseMs;
        if (r < 0.5) {
          // Small wander near home
          const dx = (Math.random() - 0.5) * 120;
          const dy = (Math.random() - 0.5) * 60;
          target = { x: agentData.home.x + dx, y: agentData.home.y + dy };
          pauseMs = 1500 + Math.random() * 2000;
        } else if (r < 0.75) {
          // Couch in lounge — three seat slots so multiple agents don't pile up
          const seats = [{ x: 840, y: 600 }, { x: 888, y: 600 }, { x: 936, y: 600 }];
          target = seats[Math.floor(Math.random() * seats.length)];
          pauseMs = 5500 + Math.random() * 4000;
        } else {
          // Glance at the lounge whiteboard (placeDisplayBoard anchor 1160, 504)
          target = { x: 1184, y: 624 };
          pauseMs = 2200 + Math.random() * 1800;
        }
        this._idleWalkTo(agentData, target.x, target.y, pauseMs);
      }

      _idleWalkTo(agentData, tx, ty, pauseMs) {
        const { sprite, home, id } = agentData;
        if (agentData.busy) { this._scheduleNextIdle(agentData); return; }
        agentData.busy = true;
        agentData.idleBusy = true;
        this.tweens.killTweensOf(sprite);

        const walk = (fx, fy, gx, gy, onDone) => {
          const dx = gx - fx, dy = gy - fy;
          if (Math.abs(dx) < 2 && Math.abs(dy) < 2) { onDone(); return; }
          const dir = Math.abs(dy) >= Math.abs(dx)
            ? (dy < 0 ? "up" : "down")
            : (dx < 0 ? "left" : "right");
          const key = `${id}-walk-${dir}`;
          if (this.anims.exists(key)) sprite.play(key);
          const dist = Math.hypot(dx, dy);
          const dur = Math.max(400, dist * 7);
          this.tweens.add({
            targets: sprite, x: gx, y: gy, duration: dur, ease: "Sine.inOut",
            onComplete: onDone
          });
        };

        walk(sprite.x, sprite.y, tx, ty, () => {
          if (!agentData.idleBusy) return; // preempted
          sprite.stop();
          sprite.setFrame(home.idleFrame);
          this.time.delayedCall(pauseMs, () => {
            if (!agentData.idleBusy) return; // preempted during pause
            walk(sprite.x, sprite.y, home.x, home.y, () => {
              if (!agentData.idleBusy) return;
              sprite.stop();
              sprite.setFrame(home.idleFrame);
              sprite.setPosition(home.x, home.y);
              this._addBreathing(sprite, home);
              agentData.idleBusy = false;
              agentData.busy = false;
              this._scheduleNextIdle(agentData);
            });
          });
        });
      }

      _actionGitPush(data) {
        const { sprite, home } = data;
        if (data.idleBusy) this._cancelIdle(data);
        if (data.busy) return;
        data.busy = true;
        const targetY = home.y + 200; // off-canvas downwards

        this.tweens.killTweensOf(sprite);
        sprite.setPosition(home.x, home.y);

        const walkKey = `${sprite.texture.key.replace("char_", "")}-walk-down`;
        if (this.anims.exists(walkKey)) sprite.play(walkKey);

        this.tweens.add({
          targets: sprite,
          y: targetY,
          duration: 900,
          ease: "Sine.in",
          onComplete: () => {
            sprite.setVisible(false);
            this.time.delayedCall(3000, () => {
              sprite.setPosition(home.x, home.y);
              sprite.setFrame(home.idleFrame);
              sprite.setAlpha(0);
              sprite.setVisible(true);
              this.tweens.add({
                targets: sprite,
                alpha: 1,
                duration: 400,
                ease: "Sine.out",
                onComplete: () => {
                  this._addBreathing(sprite, home);
                  data.busy = false;
                  this._scheduleNextIdle(data);
                }
              });
            });
          }
        });
      }

      _showBubble(sprite, home, text) {
        const padX = 6, padY = 3;
        // All shapes are drawn relative to (0,0) inside a Container so the bubble
        // tracks the sprite during walk tweens (Phase 5 fix, hardened in Phase 6
        // via the scene update() override below).
        const txt = this.add
          .text(0, 0, text, {
            fontFamily: "ui-monospace, monospace",
            fontSize: "11px",
            color: "#0a0a0f"
          })
          .setOrigin(0.5, 1);

        const w = Math.ceil(txt.width) + padX * 2;
        const h = Math.ceil(txt.height) + padY * 2;

        const g = this.add.graphics();
        g.fillStyle(0xfffbe8, 1);
        g.fillRoundedRect(-w / 2, -h, w, h, 4);
        g.lineStyle(1, 0x2a2429, 1);
        g.strokeRoundedRect(-w / 2, -h, w, h, 4);
        // Tail pointing down at the agent
        g.fillStyle(0xfffbe8, 1);
        g.fillTriangle(-4, 0, 4, 0, 0, 5);
        g.lineStyle(1, 0x2a2429, 1);
        g.lineBetween(-4, 0, 0, 5);
        g.lineBetween(4, 0, 0, 5);

        // Sprite has origin (0.5, 1.0) → sprite.y is feet, top is sprite.y - 96.
        // Container origin sits 12px above the head; tail tip extends 5px down from there.
        const Y_OFFSET = -96 - 12;
        const container = this.add
          .container(sprite.x, sprite.y + Y_OFFSET, [g, txt])
          .setDepth(2100)
          .setAlpha(0);

        // Register with the scene's per-frame bubble tracker so the bubble
        // follows the sprite during walk tweens. Scene.update() is the
        // guaranteed once-per-frame hook in Phaser 4.
        if (!this._liveBubbles) this._liveBubbles = [];
        const entry = { container, sprite, offset: Y_OFFSET };
        this._liveBubbles.push(entry);

        this.tweens.add({
          targets: container,
          alpha: 1,
          duration: 180,
          ease: "Sine.out"
        });
        this.time.delayedCall(3600, () => {
          this.tweens.add({
            targets: container,
            alpha: 0,
            duration: 220,
            ease: "Sine.in",
            onComplete: () => {
              const idx = this._liveBubbles.indexOf(entry);
              if (idx >= 0) this._liveBubbles.splice(idx, 1);
              container.destroy();
            }
          });
        });
      }

      // Scene hook: Phaser calls update(time, delta) every frame. We use it
      // to drag any live speech bubbles along with their sprites.
      update() {
        const bubbles = this._liveBubbles;
        if (bubbles && bubbles.length) {
          for (let i = 0; i < bubbles.length; i++) {
            const b = bubbles[i];
            if (b.container && b.container.active && b.sprite && b.sprite.active) {
              b.container.setPosition(b.sprite.x, b.sprite.y + b.offset);
            }
          }
        }
        const chips = this._liveNameChips;
        if (chips && chips.length) {
          for (let i = 0; i < chips.length; i++) {
            const c = chips[i];
            if (c.text && c.text.active && c.sprite && c.sprite.active) {
              c.text.setPosition(c.sprite.x, c.sprite.y + c.offset);
            }
          }
        }
      }

      _addDebugTriggers(agentMap) {
        // Persist agentMap for synthetic events
        if (!this._sseState) this._sseState = { agentMap };
        else this._sseState.agentMap = agentMap;

        const fire = (agent, action, meta = {}) => () => {
          const ev = { id: "debug-" + Date.now(), ts: Date.now(), agent, action, meta };
          console.log("[office] (debug trigger):", ev);
          this._handleEvent(ev);
        };

        const triggers = [
          { label: "▶ code.write @ dartagnan", fn: fire("dartagnan", "code.write", { file: "005_users.sql" }) },
          { label: "▶ code.write @ aramis",    fn: fire("aramis",    "code.write", { file: "index.html" }) },
          { label: "▶ code.write @ porthos",   fn: fire("porthos",   "code.write", { file: "test.mjs" }) },
          { label: "▶ code.bash  @ dartagnan", fn: fire("dartagnan", "code.bash",  { file: "npm test" }) },
          { label: "▶ git.push   @ porthos",   fn: fire("porthos",   "git.push",   { branch: "main" }) }
        ];

        let y = 32;
        for (const t of triggers) {
          const btn = this.add
            .text(8, y, t.label, {
              fontFamily: "ui-monospace, monospace",
              fontSize: "11px",
              color: "#0a0a0f",
              backgroundColor: "#fcd34dee",
              padding: { left: 6, right: 6, top: 2, bottom: 2 }
            })
            .setDepth(2000)
            .setInteractive({ useHandCursor: true });
          btn.on("pointerover", () => btn.setBackgroundColor("#fbbf24"));
          btn.on("pointerout",  () => btn.setBackgroundColor("#fcd34dee"));
          btn.on("pointerdown", t.fn);
          y += btn.height + 4;
        }
      }
    }

    const config = {
      type: Phaser.AUTO,
      parent: "game",
      width: 1280,
      height: 720,
      backgroundColor: "#0a0a0f",
      pixelArt: true,
      antialias: false,
      roundPixels: true,
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
      },
      scene: [OfficeScene]
    };

    new Phaser.Game(config);
  </script>
</body>
